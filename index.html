<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> App Developer</title>
<style>
  :root{
    --bg: #0F1115;
    --bg-soft: #161922;
    --card: #1B1F2A;
    --line: #2A2F3C;
    --text: #ECEEF2;
    --text-dim: #9AA1B2;
    --accent: #5AD6A6;
    --accent-soft: rgba(90,214,166,0.12);
    --font-display: 'Space Grotesk', 'Segoe UI', sans-serif;
    --font-body: 'Inter', 'Segoe UI', sans-serif;
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }

  body{
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }

  a{ color: inherit; text-decoration: none; }

  .wrap{
    max-width: 980px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ---------- Header ---------- */
  header{
    padding: 64px 0 40px;
    border-bottom: 1px solid var(--line);
  }

  .eyebrow{
    font-family: var(--font-body);
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 14px;
    font-weight: 600;
  }

  h1{
    font-family: var(--font-display);
    font-size: clamp(32px, 5vw, 48px);
    font-weight: 600;
    margin: 0 0 12px;
    letter-spacing: -0.01em;
  }

  header p{
    color: var(--text-dim);
    font-size: 16px;
    max-width: 540px;
    margin: 0;
  }

  /* ---------- Apps section ---------- */
  .apps-section{
    padding: 56px 0 40px;
  }

  .section-label{
    font-family: var(--font-body);
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin: 0 0 24px;
    font-weight: 600;
  }

  .apps-grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .app-card{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    transition: border-color 0.2s ease, transform 0.2s ease;
  }

  .app-card:hover{
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .app-top{
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .app-icon{
    width: 56px;
    height: 56px;
    border-radius: 12px;
    background: var(--accent-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
    overflow: hidden;
  }

  .app-icon img{
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .app-info h3{
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    margin: 0 0 2px;
  }

  .app-info .category{
    font-size: 13px;
    color: var(--text-dim);
  }

  .app-desc{
    font-size: 14px;
    color: var(--text-dim);
    margin: 0;
    flex-grow: 1;
  }

  .play-btn{
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: var(--accent);
    color: #0F1115;
    font-weight: 600;
    font-size: 14px;
    padding: 11px 16px;
    border-radius: 9px;
    transition: opacity 0.15s ease;
  }

  .play-btn:hover{ opacity: 0.88; }

  .play-btn svg{ width: 16px; height: 16px; }

  /* ---------- Footer ---------- */
  footer{
    border-top: 1px solid var(--line);
    padding: 32px 0 48px;
    margin-top: 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }

  footer .name{
    font-size: 14px;
    color: var(--text-dim);
  }

  footer .links{
    display: flex;
    gap: 20px;
    font-size: 14px;
    color: var(--text-dim);
  }

  footer .links a:hover{ color: var(--accent); }

  @media (max-width: 520px){
    header{ padding: 48px 0 32px; }
    .apps-section{ padding: 40px 0 24px; }
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <p class="eyebrow">App Developer</p>
    <p>I build small, focused Android apps. Below is a list of apps currently published on Google Play.</p>
  </header>

  <section class="apps-section">
    <p class="section-label">Published Apps</p>
    <div class="apps-grid" id="apps-grid"></div>
  </section>

  <footer>
    <p class="name">© <span id="year"></span> Brijal </p>
    <div class="links">
      <a href="mailto:briksinfo123@gmail.com">Contact</a>
    </div>
  </footer>
</div>

<script>
  /* ============================================================
     EDIT THIS LIST WHEN YOU ADD .
     Just copy one object below, paste it, and fill in the fields.

     name        -> App name shown on the card
     category    -> Small text under the name (e.g. "Finance", "Tools")
     description -> 1-2 line description of the app
     icon        -> URL to app icon image (use your Play Store icon URL,
                     or leave "" to show a placeholder emoji instead)
     emoji       -> Fallback shown if icon is "" (pick any emoji)
     playStoreUrl-> Full Play Store link to your app
     ============================================================ */
  const apps = [
    {
      name: "MoneyWise",
      category: "Business"
      description: "Track your spending, plan budgets, and stay on top of your money.",
      icon: "",
      emoji: "💰",
      playStoreUrl: "https://play.google.com/store/apps/details?id=com.prognostic.moneywise"
    }
    // Add your next app here, e.g.:
    // {
    //   name: "App Two",
    //   category: "Productivity",
    //   description: "Short description of what it does.",
    //   icon: "",
    //   emoji: "✅",
    //   playStoreUrl: "https://play.google.com/store/apps/details?id=com.example.apptwo"
    // }
  ];

  const grid = document.getElementById('apps-grid');

  apps.forEach(app => {
    const card = document.createElement('div');
    card.className = 'app-card';

    const iconHtml = app.icon
      ? `<img src="${app.icon}" alt="${app.name} icon">`
      : (app.emoji || "📱");

    card.innerHTML = `
      <div class="app-top">
        <div class="app-icon">${iconHtml}</div>
        <div class="app-info">
          <h3>${app.name}</h3>
          <div class="category">${app.category}</div>
        </div>
      </div>
      <p class="app-desc">${app.description}</p>
      <a class="play-btn" href="${app.playStoreUrl}" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 20.5v-17c0-.59.34-1.11.84-1.36L13.69 12 3.84 21.86c-.5-.25-.84-.77-.84-1.36zm10.81-7.61l2.34 2.34-9.31 5.36 6.97-7.7zm0-1.78l-6.97-7.7 9.31 5.36-2.34 2.34zm5.91 4.36l-3.51-2.02-2.6 2.6 5.91 3.41c.59-.27.97-.86.97-1.51v-2.48zm0-7.94v-2.48c0-.65-.38-1.24-.97-1.51l-5.91 3.41 2.6 2.6 3.51-2.02z"/></svg>
        Get it on Google Play
      </a>
    `;

    grid.appendChild(card);
  });

  document.getElementById('year').textContent = new Date().getFullYear();
</script>

</body>
</html>
